---
# Sync shared coding-agent / subagent definitions across tools.
# Canonical source: coding-agents/source/<name>.md  (opencode-flavored frontmatter)
# build.py renders per-tool variants under coding-agents/generated/ which are
# then symlinked into each tool's global agent location.
#
# Workflow for editing an agent:
#   1. edit coding-agents/source/<name>.md
#   2. ansible-playbook general.yml -e client_role=<host> --tags coding-agents
#   3. test in your tool of choice
#
# Removed source files are NOT automatically pruned from tool dirs — delete the
# leftover symlink by hand if you remove an agent.

- name: Ensure global agent directories exist
  file:
    path: "{{ item }}"
    state: directory
  loop:
    - "~/.config/opencode/agents"
    - "~/.claude/agents"
    - "~/.codex/agents"
    - "~/.copilot/agents"
  tags: [coding-agents]

- name: Build per-tool agent variants from canonical source
  command:
    cmd: python3 build.py
    chdir: "{{ playbook_dir }}/coding-agents"
  changed_when: false
  tags: [coding-agents]

- name: Discover canonical source agents
  find:
    paths: "{{ playbook_dir }}/coding-agents/source"
    patterns: "*.md"
  register: ca_sources
  tags: [coding-agents]

- name: Symlink OpenCode agents (canonical format, no transform)
  file:
    src: "{{ item.path }}"
    dest: "~/.config/opencode/agents/{{ item.path | basename }}"
    state: link
    force: true
  loop: "{{ ca_sources.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  tags: [coding-agents]

- name: Discover generated Claude Code agents
  find:
    paths: "{{ playbook_dir }}/coding-agents/generated/claude/agents"
    patterns: "*.md"
  register: ca_claude
  tags: [coding-agents]

- name: Symlink Claude Code agents
  file:
    src: "{{ item.path }}"
    dest: "~/.claude/agents/{{ item.path | basename }}"
    state: link
    force: true
  loop: "{{ ca_claude.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  tags: [coding-agents]

- name: Discover generated Codex agents
  find:
    paths: "{{ playbook_dir }}/coding-agents/generated/codex/agents"
    patterns: "*.toml"
  register: ca_codex
  tags: [coding-agents]

- name: Symlink Codex agents
  file:
    src: "{{ item.path }}"
    dest: "~/.codex/agents/{{ item.path | basename }}"
    state: link
    force: true
  loop: "{{ ca_codex.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  tags: [coding-agents]

- name: Discover generated Copilot CLI agents
  find:
    paths: "{{ playbook_dir }}/coding-agents/generated/copilot/agents"
    patterns: "*.agent.md"
  register: ca_copilot
  tags: [coding-agents]

- name: Symlink Copilot CLI agents
  file:
    src: "{{ item.path }}"
    dest: "~/.copilot/agents/{{ item.path | basename }}"
    state: link
    force: true
  loop: "{{ ca_copilot.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  tags: [coding-agents]
