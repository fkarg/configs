---
# Personal Mac. No bootstrap/base — managed locally via ansible-pull.
ansible_connection: local
ansible_user: felix

host_roles:
  - terminal_dotfiles
  - personal
  - os_macos
  - graphical_dotfiles
  - coding_agents

# identity
username: felix
cowfile: llama

# shell integrations
direnv: true
zoxide: true

# Monitor KVM (Philips 49B2U5900CH): Ctrl+Shift+F12 sends a DDC input-switch
# from this host to the *other* machine on the shared monitor. caeli is on
# USB-C, so kvm_switch_target_input is jolly's input code on the Philips.
# Discover with:
#   m1ddc display list                              # copy the Philips UUID
#   m1ddc display <UUID> get input                  # while sitting on USB-C
#   # then switch to jolly via the monitor's OSD and rerun:
#   m1ddc display <UUID> get input                  # → that's the value below
# kvm_display_id pins the command to the Philips even if display ordering or
# the built-in's connection state changes. 15 == 0x0F is a placeholder until
# verified.
kvm_switch_enabled: true
kvm_display_id: "0A6C28AE-EE62-41C3-8565-25FEE528B91B"
# kvm_self_input is *this* host's input on the monitor (caeli = USB-C). When
# set, the keybind toggles between self and target instead of always firing
# at target; leave null for one-shot behaviour. Discover with
# `m1ddc display <id> get input` while connected normally.
kvm_self_input: null
kvm_switch_target_input: 15

# Ctrl-as-Cmd: map Ctrl+<key> -> Cmd+<key> in GUI apps so Linux muscle memory
# (copy/paste/close-tab/...) works here, while Cmd keeps working. Terminals are
# excluded (Ctrl stays SIGINT/readline). Still needs a one-time enable in
# Karabiner → Complex Modifications → Add rule. Tune via ctrl_as_cmd_keys /
# ctrl_as_cmd_terminals if needed.
ctrl_as_cmd_enabled: true
# Neo2 override: the remap matches hardware key_codes (US-QWERTY positions), but
# under the Neo2 input source the character 'a' lives on the physical D key
# (key_code d). Without 'd', Ctrl+<our 'a'> leaks through as a raw Ctrl+a, which
# macOS's Cocoa text system treats as ^A = "beginning of line" (the bug). Adding
# 'd' makes it emit Cmd+key_code d → Cmd+a under Neo2 → select-all. Copy/paste/
# close/new-tab already work because their Neo2 keys land on r/w/t/l, which the
# default list happens to include. The rest of the default letters are harmless
# no-ops on Neo2 (wrong physical key). Extend this list if cut/undo/find/... are
# also wanted (they sit on q/b/o/... — verify each key_code in Karabiner-EventViewer).
ctrl_as_cmd_keys: [c, v, x, z, a, w, t, f, n, s, r, l, d, o, return_or_enter]

