---
# Desktop NixOS tower. Managed locally via ansible-pull.
ansible_connection: local
ansible_user: pars
ansible_port: 22

host_roles:
  - terminal_dotfiles
  - personal
  - graphical_dotfiles
  - coding_agents

# identity
username: pars
cowfile: default

# network interfaces
lan: enp10s0

# no battery (desktop)
battery: false

# USB audio DAC (main output)
pactl_sink_name: alsa_output.usb-Generic_USB_Audio-00.HiFi__Speaker__sink

background_image: "{{ home_dir }}/{{ configs_repo }}/pictures/IMAG7297.JPG"

# Monitor KVM (Philips 49B2U5900CH): Ctrl+Shift+F12 in Hyprland calls
# ~/.config/hypr/kvm-switch.sh, which runs `ddcutil setvcp 60 <code>` to flip
# the shared monitor to caeli's input. jolly is on DisplayPort, caeli is on
# USB-C, so the target is the monitor's USB-C code: 21 == 0x15 (read from caeli
# via `m1ddc display <id> get input`). The panel's other inputs: 0x11 HDMI-1,
# 0x12 HDMI-2, 0x0f DisplayPort-1. Works on every boot now that
# hardware.i2c.enable is default-on (see nixos/machines/jolly.nix).
kvm_switch_enabled: true
kvm_switch_target_input: 21
# Keep re-selecting caeli's input for a minute so the monitor does not auto-hop
# back while caeli is still waking/booting and has no signal yet.
kvm_switch_hold_seconds: 60
