---
# Packages installed on every base-managed host.
base_packages:
  - curl
  - wget
  - vim
  - htop
  - tmux
  - git
  - unzip
  - jq
  - tree
  - ncdu
  - iotop
  - net-tools
  - dnsutils
  - logrotate
  - mosh
  - fish
  - neovim
  - ripgrep

# Per-host extras (merged with base_packages).
base_packages_extra: []

# mosh-server wrapper uses this UDP port range. Also referenced by
# server_hardening to open the matching UFW rule, so it lives in base
# alongside the wrapper that actually consumes it.
base_mosh_port_range: "60842:60849"

# Timezone (timedatectl list-timezones).
base_server_timezone: "Europe/Berlin"

# Whether to dist-upgrade on every run.
base_upgrade_packages: true

# Kernel swappiness (0-200). Lower = prefer evicting file cache over anonymous pages.
base_vm_swappiness: 60

# server_hostname intentionally has no default — the opt-in server_hardening
# role only sets the hostname when a host_vars file explicitly defines it.
