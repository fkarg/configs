---
# Base profile for any Linux host: apt updates, common shell/editor/network
# packages, mosh-server wrapper, timezone, vm.swappiness. Safe on transient
# VMs — does NOT touch UFW, fail2ban, swap files, or the hostname. Those
# live in the opt-in `server_hardening` role.

- name: base — confirm Linux
  assert:
    that: ansible_facts['system'] == 'Linux'
    fail_msg: "base role only supports Linux servers"
  tags: [always]

# ============================================
# APT
# ============================================
- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600
  become: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Dist-upgrade all packages
  apt:
    upgrade: dist
  become: true
  when:
    - ansible_facts['os_family'] == 'Debian'
    - base_upgrade_packages | bool

- name: Install base packages
  apt:
    name: "{{ base_packages + (base_packages_extra | default([])) }}"
    state: present
  become: true
  when: ansible_facts['os_family'] == 'Debian'

# ============================================
# MOSH WRAPPER
# ============================================
- name: Install mosh-server wrapper with default port range
  copy:
    dest: /usr/local/bin/mosh-server
    content: |
      #!/bin/sh
      # Managed by Ansible — base role. Injects the site UDP port range
      # ({{ base_mosh_port_range }}) so mosh clients don't need --port=.
      for arg in "$@"; do
        case "$arg" in
          -p|-p*) exec /usr/bin/mosh-server "$@" ;;
        esac
      done
      exec /usr/bin/mosh-server "$@" -p {{ base_mosh_port_range }}
    mode: '0755'
  become: true
  tags: [mosh]

# ============================================
# TIMEZONE + KERNEL TUNING
# ============================================
- name: Set timezone
  command: timedatectl set-timezone {{ base_server_timezone }}
  changed_when: false
  become: true

- name: Tune vm.swappiness
  ansible.posix.sysctl:
    name: vm.swappiness
    value: "{{ base_vm_swappiness }}"
    state: present
    sysctl_file: /etc/sysctl.d/90-swap-tuning.conf
    reload: true
  become: true
  tags: [sysctl]

# ============================================
# JOURNAL SIZE CAP
# ============================================
- name: Ensure journald drop-in directory exists
  file:
    path: /etc/systemd/journald.conf.d
    state: directory
    mode: '0755'
  become: true
  when: base_journal_max_use | length > 0
  tags: [journal]

- name: Cap persistent journal size
  copy:
    dest: /etc/systemd/journald.conf.d/90-size-cap.conf
    content: |
      # Managed by Ansible — base role. Caps the persistent journal so it
      # never fills the disk; journald vacuums oldest entries past the limit.
      [Journal]
      SystemMaxUse={{ base_journal_max_use }}
    mode: '0644'
  become: true
  when: base_journal_max_use | length > 0
  notify: Restart systemd-journald
  tags: [journal]
