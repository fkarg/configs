---
# Sync shared coding-agent / subagent definitions across tools.
# Canonical source: <repo>/coding-agents/source/<name>.md
# build.py renders per-tool variants under coding-agents/generated/.

- name: Ensure global agent directories exist
  file:
    path: "{{ ca_global_dir }}"
    state: directory
  loop:
    - "~/.config/opencode"
    - "~/.config/opencode/agents"
    - "~/.claude"
    - "~/.claude/agents"
    - "~/.claude/skills"
    - "~/.codex"
    - "~/.codex/agents"
    - "~/.codex/prompts"
    - "~/.codex/skills"
    - "~/.copilot"
    - "~/.copilot/agents"
    - "~/.local/bin"
  loop_control:
    loop_var: ca_global_dir

- name: Install Codex account switcher
  file:
    src: "{{ repo_root }}/scripts/codex-account"
    dest: "~/.local/bin/codex-account"
    state: link
    force: true
  tags: [codex]

- name: Discover Codex custom prompts
  find:
    paths: "{{ coding_agents_source_dir }}/configs/codex/prompts"
    patterns: "*.md"
  register: ca_codex_prompts
  tags: [codex]

- name: Symlink Codex custom prompts
  file:
    src: "{{ ca_codex_prompt.path }}"
    dest: "~/.codex/prompts/{{ ca_codex_prompt.path | basename }}"
    state: link
    force: true
  loop: "{{ ca_codex_prompts.files }}"
  loop_control:
    loop_var: ca_codex_prompt
    label: "{{ ca_codex_prompt.path | basename }}"
  tags: [codex]

# Symlink per-tool global config files that hold only curated, machine-independent
# settings (no secrets, no host paths) and that the tool reads or writes in place.
# Editing on any machine writes back through the symlink, so changes propagate via
# git. Each tool keeps its host-specific state (trusted paths, login, auth) in a
# separate local file that is NOT tracked in this (public) repo.
- name: Symlink per-tool global config files
  file:
    src: "{{ coding_agents_source_dir }}/configs/{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
  loop:
    - { src: "claude/settings.json",         dest: "~/.claude/settings.json" }
    - { src: "claude/statusline-command.sh", dest: "~/.claude/statusline-command.sh" }
    - { src: "claude/agents-md-hook.sh",     dest: "~/.claude/agents-md-hook.sh" }
    - { src: "claude/stop-queue-hook.sh",    dest: "~/.claude/stop-queue-hook.sh" }
    - { src: "copilot/settings.json",        dest: "~/.copilot/settings.json" }
    - { src: "opencode/opencode.json",       dest: "~/.config/opencode/opencode.json" }
    # Shared global working-style prefs, one source -> every tool's global instructions file.
    - { src: "shared/AGENTS.md",             dest: "~/.claude/CLAUDE.md" }
    - { src: "shared/AGENTS.md",             dest: "~/.codex/AGENTS.md" }
    - { src: "shared/AGENTS.md",             dest: "~/.config/opencode/AGENTS.md" }
  loop_control:
    label: "{{ item.dest }}"

# Codex is the exception: it atomically rewrites ~/.codex/config.toml (which would
# clobber a symlink) and commingles host state (trusted [projects.*], oss_provider,
# nux counters, auth) with prefs. So rather than symlink it, overlay just the
# curated subset (configs/codex/shared.toml) onto the codex-owned local file.
- name: Merge curated codex settings into the local codex config
  command:
    cmd: python3 merge_codex_config.py
    chdir: "{{ coding_agents_source_dir }}"
  register: ca_codex_merge
  changed_when: "'changed:' in ca_codex_merge.stdout"

- name: Build per-tool agent variants from canonical source
  command:
    cmd: python3 build.py
    chdir: "{{ coding_agents_source_dir }}"
  changed_when: false

- name: Discover canonical source agents
  find:
    paths: "{{ coding_agents_source_dir }}/source"
    patterns: "*.md"
  register: ca_sources

- name: Symlink OpenCode agents (canonical format, no transform)
  file:
    src: "{{ item.path }}"
    dest: "~/.config/opencode/agents/{{ item.path | basename }}"
    state: link
    force: true
  loop: "{{ ca_sources.files }}"
  loop_control:
    label: "{{ item.path | basename }}"

- name: Discover generated Claude Code agents
  find:
    paths: "{{ coding_agents_source_dir }}/generated/claude/agents"
    patterns: "*.md"
  register: ca_claude

- name: Symlink Claude Code agents
  file:
    src: "{{ item.path }}"
    dest: "~/.claude/agents/{{ item.path | basename }}"
    state: link
    force: true
  loop: "{{ ca_claude.files }}"
  loop_control:
    label: "{{ item.path | basename }}"

- name: Discover generated Claude Code skills
  find:
    paths: "{{ coding_agents_source_dir }}/generated/claude/skills"
    file_type: directory
  register: ca_claude_skills

- name: Symlink Claude Code skills
  file:
    src: "{{ item.path }}"
    dest: "~/.claude/skills/{{ item.path | basename }}"
    state: link
    force: true
  loop: "{{ ca_claude_skills.files }}"
  loop_control:
    label: "{{ item.path | basename }}"

- name: Discover generated Codex agents
  find:
    paths: "{{ coding_agents_source_dir }}/generated/codex/agents"
    patterns: "*.toml"
  register: ca_codex

- name: Symlink Codex agents
  file:
    src: "{{ item.path }}"
    dest: "~/.codex/agents/{{ item.path | basename }}"
    state: link
    force: true
  loop: "{{ ca_codex.files }}"
  loop_control:
    label: "{{ item.path | basename }}"

- name: Discover generated Codex skills
  find:
    paths: "{{ coding_agents_source_dir }}/generated/codex/skills"
    file_type: directory
  register: ca_codex_skills

- name: Symlink Codex skills
  file:
    src: "{{ item.path }}"
    dest: "~/.codex/skills/{{ item.path | basename }}"
    state: link
    force: true
  loop: "{{ ca_codex_skills.files }}"
  loop_control:
    label: "{{ item.path | basename }}"

- name: Expose Claude Code plugin skills to Codex (e.g. superpowers)
  shell: |
    src=$(ls -dt "$HOME"/{{ item }}/ 2>/dev/null | head -1)
    [ -z "$src" ] && exit 0
    for d in "$src"*/; do
      [ -e "${d}SKILL.md" ] || continue
      ln -sfn "$d" "$HOME/.codex/skills/$(basename "$d")"
    done
  args:
    executable: /bin/bash
  loop: "{{ ca_codex_plugin_skill_globs }}"
  changed_when: false
  tags: [codex]

- name: Discover generated Copilot CLI agents
  find:
    paths: "{{ coding_agents_source_dir }}/generated/copilot/agents"
    patterns: "*.agent.md"
  register: ca_copilot

- name: Symlink Copilot CLI agents
  file:
    src: "{{ item.path }}"
    dest: "~/.copilot/agents/{{ item.path | basename }}"
    state: link
    force: true
  loop: "{{ ca_copilot.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
