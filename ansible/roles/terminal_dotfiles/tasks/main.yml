---
# Generic terminal dotfiles: configs repo presence, fish, nvim/vim. No
# personal identity bits (gitconfig, private repos) — those live in the
# `personal` role so this is safe to apply on any VM/server.

# ============================================
# CONFIGS REPO PRESENCE (needed because fish/nvim symlinks resolve into it)
# ============================================
- name: Check if .ssh key present
  stat:
    path: ~/.ssh/id_rsa.pub
  register: _ssh
  tags: [repos, always]

- name: Make sure ~/configs/ is present (via SSH)
  git:
    repo: "git@github.com:{{ git_username }}/{{ configs_repo }}.git"
    dest: "~/{{ configs_repo }}"
    accept_hostkey: true
    update: no
  register: _repo
  when: _ssh is succeeded and _ssh.stat.exists
  failed_when: false
  tags: [repos]

- name: Make sure ~/configs/ is present (via HTTPS fallback)
  git:
    repo: "https://github.com/{{ git_username }}/{{ configs_repo }}.git"
    dest: "~/{{ configs_repo }}"
    accept_hostkey: true
    update: no
  register: _repo
  when: not (_ssh.stat.exists | default(false))
  failed_when: false
  tags: [repos]

- name: Update ~/configs/ repository
  git:
    repo: "git@github.com:{{ git_username }}/{{ configs_repo }}.git"
    dest: "~/{{ configs_repo }}"
  when: _repo is succeeded and _ssh.stat.exists
  failed_when: false
  tags: [repos]

# ============================================
# GIT CONFIG (mostly generic preferences — rebase, mergetool, autocorrect;
# identity lines pull from group_vars/all.yml: git_email, git_name, signingkey)
# ============================================
- name: Template .gitconfig
  template:
    src: gitconfig.j2
    dest: ~/.gitconfig
  tags: [git]

# Global git hooks: enforce "no AI attribution in git history" on every repo,
# harness-independently. The dispatcher strips AI co-author/footer lines on
# commit-msg and delegates to each repo's own hook (so per-project hooks are
# not disabled by the global core.hooksPath set in gitconfig.j2).
- name: Ensure global git hooks directory exists
  file:
    path: ~/.config/git/hooks
    state: directory
  tags: [git]

- name: Install global git hook dispatcher
  copy:
    src: git-hooks/dispatch
    dest: ~/.config/git/hooks/dispatch
    mode: "0755"
  tags: [git]

- name: Link standard git hooks to the dispatcher
  file:
    src: dispatch
    dest: "~/.config/git/hooks/{{ item }}"
    state: link
    force: true
  loop:
    - commit-msg
    - prepare-commit-msg
    - pre-commit
    - pre-push
    - pre-rebase
    - post-commit
    - post-merge
    - post-checkout
  tags: [git]

# ============================================
# FISH
# ============================================
- include_tasks: link_dotdir.yml
  vars: { link_src: fish, link_dest: ~/.config/fish }
  tags: [fish]

- name: Template fish config
  template:
    src: fishconfig.j2
    dest: ~/.config/fish/config.fish
  notify: "install br"
  tags: [fish]

# ============================================
# NVIM + VIM
# ============================================
- name: Create nvim plugin directory
  file:
    path: ~/.config/nvimplugins
    state: directory
  tags: [nvim]

- include_tasks: link_dotdir.yml
  vars: { link_src: nvim, link_dest: ~/.config/nvim }
  tags: [nvim]

- include_tasks: link_dotdir.yml
  vars: { link_src: nvim, link_dest: ~/.config/vim }
  tags: [nvim]

# ============================================
# TMUX + ZELLIJ (terminal multiplexers)
# Single-file configs we fully own, so we force-link the file directly rather
# than going through link_dotdir's directory-preservation dance. tmux targets
# ~/.tmux.conf (not the XDG path) so it's still read by the older tmux builds on
# unfamiliar servers. Colors: see the COLORTERM export in fishconfig.j2.
# ============================================
- name: Symlink .tmux.conf
  file:
    src: "~/{{ configs_repo }}/{{ dotconfigdir }}/tmux/tmux.conf"
    dest: ~/.tmux.conf
    state: link
    force: true
  tags: [tmux]

- name: Ensure zellij config directory exists
  file:
    path: ~/.config/zellij
    state: directory
  tags: [zellij]

- name: Symlink zellij config.kdl
  file:
    src: "~/{{ configs_repo }}/{{ dotconfigdir }}/zellij/config.kdl"
    dest: ~/.config/zellij/config.kdl
    state: link
    force: true
  tags: [zellij]
