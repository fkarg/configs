################
### MONITORS ###
################

# Syntax: monitor = name, resolution@refresh, position, scale
# `auto` lets Hyprland place outputs next to each other. On this 32:9 setup the
# explicit 5120x1440@60 entries make the preferred ultrawide mode obvious even
# when a display reports odd EDID data.
monitor = DP-1, 5120x1440@60, auto, 1
monitor = DP-2, 5120x1440@60, auto, 1
monitor = DP-3, 5120x1440@60, auto, 1
monitor = DP-4, 5120x1440@60, auto, 1
# Fallback for any other connected monitor: pick the highest available mode.
monitor = , highres, auto, 1
# This output is intentionally disabled. Keep this when the GPU/monitor exposes
# a ghost HDMI connector or a TV/AVR creates an unwanted desktop surface.
monitor = HDMI-A-2, disable

# Popular monitor variants to consider later:
# - Force a primary-like position: monitor = DP-1, 5120x1440@60, 0x0, 1
# - Higher refresh if EDID and cable allow it: monitor = DP-1, 5120x1440@120, 0x0, 1
# - HiDPI scaling: monitor = DP-1, 5120x1440@60, 0x0, 1.25
# - Mirror an output for capture/projector use: monitor = HDMI-A-1, preferred, auto, 1, mirror, DP-1

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = dolphin
$menu = fuzzel

# These variables keep keybindings readable. Swapping launchers or terminals is
# then a one-line edit instead of touching every bind below.
# Popular alternatives:
# $terminal = foot
# $fileManager = nautilus
# $menu = rofi -show drun

#################
### AUTOSTART ###
#################

# `exec-once` starts commands only when Hyprland starts, not after every reload.
# Keep session-specific tools here instead of systemd user services when they
# only work under a Hyprland compositor.
exec-once = mako
exec-once = waybar -c ~/.config/waybar/hyprland.jsonc -s ~/.config/waybar/style.css
exec-once = hypridle
exec-once = hyprpolkitagent
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Popular autostart additions:
# exec-once = hyprpaper
# exec-once = udiskie --tray
# exec-once = copyq --start-server
# exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

#################
### ENVIRONMENT ###
#################

# Cursor settings are also set from Nix; keeping them here helps apps launched
# inside Hyprland agree with the compositor.
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic

# NVIDIA/Wayland knobs. Keep device selection automatic on this single-GPU host;
# over-constraining DRM discovery can make a failed compositor launch look like
# a broken GDM login.
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = GBM_BACKEND,nvidia
env = NVD_BACKEND,direct
# Do not set AQ_DRM_DEVICES to a /dev/dri/by-path PCI name here: Aquamarine
# treats ':' as a device-list separator, so pci-0000:01:00.0-card is split into
# invalid paths and Hyprland aborts before the GDM session can register.
# If this host grows a real multi-GPU setup, prefer a verified /dev/dri/cardN
# value or re-check the current Hyprland multi-GPU guidance first.
# Electron apps should prefer Wayland where possible without forcing every app.
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# Popular environment options:
# env = MOZ_ENABLE_WAYLAND,1
# env = QT_QPA_PLATFORM,wayland;xcb
# env = SDL_VIDEODRIVER,wayland
# env = CLUTTER_BACKEND,wayland

#################
### GENERAL ###
#################

general {
    # Inner gaps are between windows; outer gaps are between windows and screen
    # edges. Small values keep the ultrawide usable without feeling cramped.
    gaps_in = 3
    gaps_out = 5
    border_size = 2

    # Active border supports multiple colors and an angle. Inactive border is a
    # single quiet gray so focus remains obvious.
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # `dwindle` is the binary-tree tiling layout. `master` is also configured
    # below and can be selected dynamically with hyprctl/layout binds.
    layout = dwindle

    # Popular options:
    # resize_on_border = true
    # hover_icon_on_border = true
    # extend_border_grab_area = 10
}

decoration {
    # Rounded corners and opacity. 0 rounding is the sharp/tiled purist style;
    # 8-12 is the common Hyprland look.
    rounding = 10
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 1.0

    # Popular visual options. Blur/shadow can look great, but can also be the
    # first thing to disable while debugging NVIDIA/compositor weirdness.
    # shadow {
    #     enabled = true
    #     range = 12
    #     render_power = 3
    # }
    # blur {
    #     enabled = true
    #     size = 4
    #     passes = 2
    #     vibrancy = 0.15
    # }
}

animations {
    # Disable all animations quickly with `enabled = no` if diagnosing latency,
    # visual corruption, or motion sensitivity.
    enabled = yes

    # Bezier curves are named easing functions used by the animation lines.
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1, 10,   default
    animation = border,        1, 5.39, easeOutQuint
    animation = windows,       1, 4.79, easeOutQuint
    animation = windowsIn,     1, 4.1,  easeOutQuint, popin 87%
    animation = windowsOut,    1, 1.49, linear,       popin 87%
    animation = fadeIn,        1, 1.73, almostLinear
    animation = fadeOut,       1, 1.46, almostLinear
    animation = fade,          1, 3.03, quick
    animation = layers,        1, 3.81, easeOutQuint
    animation = layersIn,      1, 4,    easeOutQuint, fade
    animation = layersOut,     1, 1.5,  linear,       fade
    animation = fadeLayersIn,  1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces,    1, 1.94, almostLinear, fade
    animation = workspacesIn,  1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
    animation = zoomFactor,    1, 7,    quick

    # Popular calmer alternative:
    # animation = windows, 1, 3, easeOutQuint
    # animation = workspaces, 1, 2, easeOutQuint, slide
}

misc {
    # -1 keeps Hyprland's default wallpaper behavior. Set 0 to disable it.
    force_default_wallpaper = -1
    disable_hyprland_logo = false

    # Popular options:
    # disable_splash_rendering = true
    # focus_on_activate = true
    # vfr = true
}

cursor {
    # Hardware cursors can be troublesome on some NVIDIA setups. This is left on
    # for performance; flip to 1 if the cursor disappears or flickers.
    no_hardware_cursors = 0
    # CPU buffer helps avoid cursor format issues on some stacks.
    use_cpu_buffer = 1
    enable_hyprcursor = false

    # Popular options:
    # inactive_timeout = 5
    # hide_on_key_press = true
}

dwindle {
    # Preserve the split direction when toggling or moving tiled windows.
    preserve_split = true

    # Popular dwindle options:
    # smart_split = true
    # smart_resizing = true
}

master {
    # If you switch to master layout, new windows become the master by default.
    new_status = master

    # Popular master options:
    # mfact = 0.55
    # new_on_top = true
}

input {
    # German Neo layout by default. The B keybinds below switch between Neo and
    # regular German without editing the file.
    kb_layout = de
    kb_variant = neo
    kb_model =
    kb_options =
    kb_rules =

    # Focus follows the pointer. Set 0 for click-to-focus, 2 for loose focus.
    follow_mouse = 1
    # Pointer acceleration; 0 means libinput default.
    sensitivity = 0

    # Popular input options:
    # repeat_rate = 40
    # repeat_delay = 300
    # accel_profile = flat
    # numlock_by_default = true

    touchpad {
        natural_scroll = false
        # Popular laptop options:
        # tap-to-click = true
        # disable_while_typing = true
        # scroll_factor = 0.6
    }
}

# Three-finger horizontal swipes move workspaces. If this conflicts with browser
# gestures or touchpad habits, comment it out first.
gesture = 3, horizontal, workspace

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# Binding forms used below:
# - bind: normal keybind
# - bindm: mouse drag bind
# - bindel: repeatable bind that also works while locked for media/brightness
# - bindl: locked-session-capable bind, useful for media keys
# Modifiers combine as words: `$mainMod SHIFT`, `$mainMod CTRL`, etc.

# Launchers and basic window control.
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, C, killactive,
bind = $mainMod, X, killactive,
bind = $mainMod, A, exec, hyprlock
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, F, fullscreen
bind = $mainMod, Z, pseudo

# Popular extra app binds:
# bind = $mainMod, F1, exec, firefox
bind = $mainMod, Space, exec, $menu
# bind = $mainMod SHIFT, Q, exit,

# Keyboard layout switching. This changes Hyprland live state, not the config.
bind = $mainMod, B, exec, hyprctl keyword input.kb_layout de,neo
bind = $mainMod SHIFT, B, exec, hyprctl keyword input.kb_layout de

# Focus movement uses Neo-friendly N/M/G/D plus arrow-key fallbacks.
bind = $mainMod, N, movefocus, l
bind = $mainMod, M, movefocus, d
bind = $mainMod, G, movefocus, u
bind = $mainMod, D, movefocus, r
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, N, movewindow, l
bind = $mainMod SHIFT, M, movewindow, d
bind = $mainMod SHIFT, G, movewindow, u
bind = $mainMod SHIFT, D, movewindow, r
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Layout control. `layoutmsg togglesplit` is the current Hyprland 0.55 form for
# the old togglesplit dispatcher.
bind = $mainMod, H, exec, hyprctl dispatch split h
bind = $mainMod, T, exec, hyprctl dispatch split v
bind = $mainMod, L, layoutmsg, togglesplit
bind = $mainMod, W, exec, hyprctl dispatch setlayout tabbed
bind = $mainMod SHIFT, E, layoutmsg, togglesplit
bind = $mainMod, P, focuswindow, parent
bind = $mainMod, comma, focuswindow, child

# Popular layout binds:
# bind = $mainMod, Space, togglefloating,
# bind = $mainMod SHIFT, F, fullscreen, 1
# bind = $mainMod, Y, togglegroup,

# Scratchpad-style special workspace. Toggle shows/hides it; SHIFT moves the
# focused window into it.
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Region screenshots copied directly to clipboard. `slurp` selects geometry,
# `grim` captures it, and wl-copy stores PNG data.
bind = $mainMod CTRL, S, exec, grim -g "$(slurp)" - | wl-copy --type image/png
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy --type image/png

# Lock and suspend. Hypridle also calls the lock path before sleep.
bind = $mainMod SHIFT, L, exec, hyprlock
bind = $mainMod SHIFT, U, exec, systemctl suspend

# Config reload while staying in-session. Useful when editing this file.
bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod, Period, exec, hyprctl reload

# Workspace navigation. You have 20 numbered workspaces: 1-10 direct, 11-20 via
# CTRL. On a 32:9 display this gives room for task-specific lanes.
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod CTRL, 1, workspace, 11
bind = $mainMod CTRL, 2, workspace, 12
bind = $mainMod CTRL, 3, workspace, 13
bind = $mainMod CTRL, 4, workspace, 14
bind = $mainMod CTRL, 5, workspace, 15
bind = $mainMod CTRL, 6, workspace, 16
bind = $mainMod CTRL, 7, workspace, 17
bind = $mainMod CTRL, 8, workspace, 18
bind = $mainMod CTRL, 9, workspace, 19
bind = $mainMod CTRL, 0, workspace, 20

# Move the focused window to a workspace with the same numbering scheme.
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod CTRL SHIFT, 1, movetoworkspace, 11
bind = $mainMod CTRL SHIFT, 2, movetoworkspace, 12
bind = $mainMod CTRL SHIFT, 3, movetoworkspace, 13
bind = $mainMod CTRL SHIFT, 4, movetoworkspace, 14
bind = $mainMod CTRL SHIFT, 5, movetoworkspace, 15
bind = $mainMod CTRL SHIFT, 6, movetoworkspace, 16
bind = $mainMod CTRL SHIFT, 7, movetoworkspace, 17
bind = $mainMod CTRL SHIFT, 8, movetoworkspace, 18
bind = $mainMod CTRL SHIFT, 9, movetoworkspace, 19
bind = $mainMod CTRL SHIFT, 0, movetoworkspace, 20

# Jump back to the previously focused workspace.
bind = $mainMod, Tab, workspace, previous

# Mouse wheel workspace switching while holding SUPER.
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Mouse drag move/resize while holding SUPER.
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Media and brightness keys. `bindel` repeats while held and works on the lock
# screen, so volume/brightness remain available after locking.
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Popular media/screenshot additions:
bind = $mainMod SHIFT, S, exec, grim - | swappy -f -
bind = $mainMod CTRL, V, exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy
# bindel = , XF86KbdBrightnessUp, exec, brightnessctl -d '*::kbd_backlight' set +10%

# Resize submap: SUPER+O enters resize mode, then N/G/M/D or arrows resize the
# active window until Return or Escape resets back to normal binds.
bind = $mainMod, O, submap, resize
submap = resize
binde = , N, resizeactive, -10 0
binde = , G, resizeactive, 0 10
binde = , M, resizeactive, 0 -10
binde = , D, resizeactive, 10 0
binde = , left, resizeactive, -10 0
binde = , down, resizeactive, 0 10
binde = , up, resizeactive, 0 -10
binde = , right, resizeactive, 10 0
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

####################
### WINDOW RULES ###
####################

# Hyprland 0.55 uses block-style window rules. This one keeps `hyprland-run`
# helper windows floating and positions them near the lower-left edge.
windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}

