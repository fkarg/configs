# --- Colors ---
# Truecolor is also forced globally via COLORTERM=truecolor in the fish config
# (terminal_dotfiles); these RGB overrides are kept as defense-in-depth for
# shells/sessions that don't export it.
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm*:RGB"
set -ag terminal-overrides ",alacritty:RGB"
set -ag terminal-overrides ",wezterm:RGB"
set -ag terminal-overrides ",foot:RGB"

# --- Scroll & mouse ---
set -g mouse on
set -g history-limit 50000
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel

# --- Reload ---
bind r source-file ~/.tmux.conf \; display-message "config reloaded"

# --- Splits (open in current pane's cwd) ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
bind c new-window -c "#{pane_current_path}"

# --- Pane navigation without prefix ---
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# --- Windows ---
set -g renumber-windows on

# --- Visual ---
set -g status-interval 5
set -g display-time 4000
set -g monitor-activity off
set -g visual-activity off
set -g visual-bell off
set -g bell-action none

# --- Clipboard (OSC 52) ---
set -g set-clipboard on
