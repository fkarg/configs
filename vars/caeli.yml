cowfile: llama
username: felix
link_nixos: false

# shell integrations
direnv: true
zoxide: true

# common brew formulae for macOS host (top-level only, deps auto-installed)
brew_packages_common:
  # shell, prompt & file utilities
  - bat
  - coreutils
  - cowsay
  - direnv
  - eza
  - fish
  - fortune
  - htop
  - ncdu
  - neofetch
  - ripgrep-all
  - watch
  - wget
  - zoxide

  # editor, language servers & linters
  - languagetool
  - neovim
  - tinymist
  - yamllint

  # git & dev workflow
  - gh
  - git
  - git-filter-repo
  - glow
  - lazygit
  - tokei

  # programming languages & runtimes
  - ghc
  - node@24
  - oven-sh/bun/bun
  - pnpm
  - python-setuptools
  - rust
  - uv

  # containers & kubernetes
  - docker
  - docker-buildx
  - docker-compose
  - k3d
  - k9s
  - kubecfg
  - kubernetes-cli
  - kustomize

  # networking & remote access
  - iperf
  - ldns
  - nmap
  - socat
  - xpipe

  # storage & databases
  - minio-mc
  - postgresql@17

  # documents & typesetting
  - ghostscript
  - graphviz
  - psutils
  - qpdf
  - typst

  # finance / accounting
  - beancount
  - beancount-language-server
  - beanquery
  - fava

  # infrastructure / config management
  - ansible
  - ansible-language-server
  - ansible-lint

  # AI / coding agents
  - ccusage
  - gemini-cli
  - opencode

  # macOS-specific helpers
  - batt
  - sleepwatcher
